name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: SEO static validation
        run: npm run seo:validate

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://zakher.travel

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/az --timeout 60000

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
